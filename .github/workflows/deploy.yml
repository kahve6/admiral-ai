name: Deploy via FTP

# Admiral AI is a static site (no build step). On every push to main the site
# files are uploaded to the hosting account over FTP. The action keeps a sync
# state file on the server so only changed files transfer.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   FTP_HOST  — FTP server hostname, e.g. ftp.yourdomain.com
#   FTP_USER  — FTP username
#   FTP_PASS  — FTP password
#
# NOTE: server-dir is where files land on the host. Default "./" assumes your
# FTP account opens directly in the web root. If your files end up OUTSIDE the
# served folder, change server-dir to "public_html/" (cPanel/Hostinger default).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP upload
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          local-dir: ./
          server-dir: ./
          # Dev-only files that must NOT be published to the host.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            .gstack/**
            inspection/**
            scripts/**
            **/*.md
            .gitignore
            .ftp-deploy-sync-state.json
